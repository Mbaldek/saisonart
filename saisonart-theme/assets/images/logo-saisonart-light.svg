<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">

  <!-- GALERIE — small caps tracké -->
  <text
    x="160" y="22"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="7"
    text-anchor="middle"
    fill="rgba(44,61,53,0.38)"
    transform="translate(-3.5,0)">GALERIE</text>

  <!-- Trait accent brun -->
  <line x1="40" y1="30" x2="280" y2="30" stroke="#8B5E3C" stroke-width="1"/>

  <!-- Saison — italic serif -->
  <text
    x="160" y="62"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-style="italic"
    font-weight="400"
    letter-spacing="0.5"
    text-anchor="middle"
    fill="rgba(44,61,53,0.72)">Saison</text>

  <!-- ART — bold brun -->
  <text
    x="160" y="90"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="700"
    letter-spacing="6"
    text-anchor="middle"
    fill="#8B5E3C"
    transform="translate(-5,0)">ART</text>

</svg>
